# Sample workflow for building and deploying a website to GitHub Pages
name: Deploy Pages

on:
  # Runs on pushes targeting the default branch and c4 files
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_call:    
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
  
# Allow only one concurrent deployment, skipping runs queued between the run in progress and the latest queued.
# However, do NOT cancel in-progress runs, as we want to allow these production deployments to be completed.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4
        
      - name: Install LikeC4
        run: npm install -g likec4@latest
        
      - name: Debug environment
        run: |
          echo "Base path: ${{ steps.pages.outputs.base_path }}"
          echo "Repository: ${{ github.repository }}"
          echo "LikeC4 version:"
          likec4 --version
          
      - name: Build with LikeC4 CLI
        run: |
          likec4 build \
            --path src \
            --output dist \
            --base "${{ steps.pages.outputs.base_path }}" \
            --use-dot false \
            --title "LikeC4 Architecture Diagrams"
            
      - name: List build output
        run: |
          echo "Build output:"
          ls -la dist/
          echo "Index.html content:"
          head -20 dist/index.html
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # Deployment job
  deploy-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
